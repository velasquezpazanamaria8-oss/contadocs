<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
<defs>
  <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#4f6ef7"/>
    <stop offset="100%" style="stop-color:#0ea472"/>
  </linearGradient>
  <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#4f6ef7"/>
    <stop offset="100%" style="stop-color:#0ea472"/>
  </linearGradient>
  <linearGradient id="gradShine" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:rgba(255,255,255,0.28)"/>
    <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
  </linearGradient>
</defs>

<!-- SIN fondo — transparente -->

<!-- Icono 88x88 centrado verticalmente -->
<rect x="0" y="16" width="88" height="88" rx="22" fill="url(#grad1)"/>
<rect x="0" y="16" width="88" height="44" rx="22" fill="url(#gradShine)"/>
<rect x="0" y="38" width="88" height="22" fill="url(#gradShine)"/>

<!-- Documento dentro -->
<rect x="24" y="34" width="38" height="48" rx="6" fill="white" fill-opacity="0.15"/>
<rect x="24" y="34" width="38" height="48" rx="6" fill="none" stroke="white" stroke-width="1.8" stroke-opacity="0.45"/>
<path d="M50 34 L62 46" fill="none" stroke="white" stroke-width="1.8" stroke-opacity="0.5"/>
<path d="M50 34 L50 46 L62 46" fill="white" fill-opacity="0.22"/>
<line x1="30" y1="54" x2="56" y2="54" stroke="white" stroke-width="2.5" stroke-opacity="0.85" stroke-linecap="round"/>
<line x1="30" y1="63" x2="56" y2="63" stroke="white" stroke-width="2.5" stroke-opacity="0.85" stroke-linecap="round"/>
<line x1="30" y1="72" x2="48" y2="72" stroke="white" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>

<!-- Texto -->
<text x="104" y="74" fill="#0f172a" font-size="48" font-weight="700"
  font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
  letter-spacing="-2">Conta</text>
<text x="264" y="74" fill="url(#gradText)" font-size="48" font-weight="700"
  font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
  letter-spacing="-2">Docs</text>

<!-- Tagline -->
<text x="105" y="97" fill="#94a3b8" font-size="13" font-weight="400"
  font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
  letter-spacing="0.3">Portal de documentos contables · Perú</text>
</svg>
